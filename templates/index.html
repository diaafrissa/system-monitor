<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة مراقبة أداء النظام</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding: 20px; }
        .container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .card { background: white; padding: 20px; border-radius: 10px; shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; }
        h1 { color: #333; }
        .value { font-size: 24px; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>
    <h1>لوحة مراقبة أداء النظام (Web GUI)</h1>
    <div class="container">
        <div class="card">
            <h3>استهلاك المعالج (CPU)</h3>
            <canvas id="cpuChart"></canvas>
            <div id="cpuValue" class="value">0%</div>
        </div>
        <div class="card">
            <h3>استهلاك الذاكرة (RAM)</h3>
            <canvas id="memChart"></canvas>
            <div id="memValue" class="value">0%</div>
        </div>
    </div>

    <script>
        function createChart(id, label, color) {
            return new Chart(document.getElementById(id), {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [0, 100],
                        backgroundColor: [color, '#eee'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        const cpuChart = createChart('cpuChart', 'CPU', '#ff6384');
        const memChart = createChart('memChart', 'Memory', '#36a2eb');

        async function updateData() {
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();
                
                // تحديث المعالج
                cpuChart.data.datasets[0].data = [data.cpu_usage_percent, 100 - data.cpu_usage_percent];
                cpuChart.update();
                document.getElementById('cpuValue').innerText = data.cpu_usage_percent + '%';

                // تحديث الذاكرة
                memChart.data.datasets[0].data = [data.memory_usage.percent, 100 - data.memory_usage.percent];
                memChart.update();
                document.getElementById('memValue').innerText = data.memory_usage.percent + '%';
            } catch (e) { console.error("Error fetching data", e); }
        }

        setInterval(updateData, 1000);
    </script>
</body>
</html>
